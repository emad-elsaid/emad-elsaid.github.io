<script src="https://player.twitch.tv/js/embed/v1.js"></script>

<style>
 #twitch-player-container {
     position: fixed;
     bottom: 20px;
     right: 20px;
     width: 400px;
     height: 225px;
     z-index: 1000;
     box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
     border-radius: 8px;
     overflow: hidden;
     display: none;
 }

 #twitch-player-container.visible {
     display: block;
 }

 #twitch-embed,
 #twitch-embed iframe {
     width: 100% !important;
     height: 100% !important;
     display: block;
 }

 #twitch-player-toggle {
     position: fixed;
     bottom: 255px;
     right: 30px;
     z-index: 1001;
     background: rgba(0, 0, 0, 0.7);
     color: white;
     border: none;
     padding: 8px 12px;
     border-radius: 4px;
     cursor: pointer;
     font-weight: bold;
     font-size: 16px;
     line-height: 1;
 }

 #twitch-player-toggle:hover {
     background: rgba(0, 0, 0, 0.9);
 }

 @media (max-width: 768px) {
     #twitch-player-container {
         width: calc(100vw - 40px);
         height: calc((100vw - 40px) * 9 / 16);
         bottom: 10px;
         right: 10px;
     }
     
     #twitch-player-toggle {
         bottom: calc((100vw - 40px) * 9 / 16 + 20px);
         right: 20px;
         padding: 6px 10px;
         font-size: 14px;
     }
 }
</style>

<button id="twitch-player-toggle">✕</button>
<div id="twitch-player-container" class="visible">
    <div id="twitch-embed"></div>
</div>

<script>
    (function() {
        const toggle = document.getElementById('twitch-player-toggle');
        const container = document.getElementById('twitch-player-container');
        let player = null;

        // Initialize player immediately
        player = new Twitch.Player('twitch-embed', {
            channel: 'internalerr',
            width: '100%',
            height: '100%',
            muted: false,
            parent: ['www.emadelsaid.com', 'emadelsaid.com', 'localhost']
        });

        toggle.addEventListener('click', function() {
            if (container.classList.contains('visible')) {
                container.classList.remove('visible');
                toggle.textContent = '📺';
                if (player) {
                    player.pause();
                }
            } else {
                container.classList.add('visible');
                toggle.textContent = '✕';
                if (player) {
                    player.play();
                }
            }
        });
    })();
</script>
